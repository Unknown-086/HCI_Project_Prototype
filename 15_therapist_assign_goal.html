<body class="bg-surface text-on-surface min-h-screen flex flex-col antialiased">
<!-- Task-Focused Header (Navigation suppressed per rules) -->
<header class="flex items-center justify-between px-margin-mobile h-16 w-full max-w-md mx-auto bg-surface z-50 border-b border-outline-variant sticky top-0">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors text-on-surface-variant active:scale-95 duration-150" onclick="window.location.href='14_therapist_patient_profile.html'">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile font-bold text-primary text-center flex-1 pr-10">Assign Goal</h1>
</header>
<!-- Main Content Area -->
<main class="flex-1 w-full max-w-md mx-auto px-margin-mobile py-stack-md flex flex-col gap-stack-md">
<!-- Form Container -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-DEFAULT p-6 flex flex-col gap-stack-md shadow-sm">
<!-- Goal Category Dropdown -->
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface" for="goalCategory">Goal Category</label>
<div class="relative">
<select class="w-full bg-surface-container-low border border-outline-variant rounded-DEFAULT px-4 py-3 font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="goalCategory">
<option disabled="" selected="" value="">Select a category</option>
<option value="social">Social Interaction</option>
<option value="routine">Daily Routine</option>
<option value="emotional">Emotional Regulation</option>
<option value="communication">Communication</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-outline">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Goal Description Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface" for="goalDescription">Goal Description</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-DEFAULT px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="goalDescription" placeholder="What is the specific goal?" type="text"/>
<p class="font-body-md text-[13px] text-on-surface-variant mt-1">Be clear and actionable.</p>
</div>
<!-- Difficulty Toggle -->
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface">Difficulty</label>
<div class="flex bg-surface-container-low p-1 rounded-full border border-outline-variant">
<button class="flex-1 py-2 text-center rounded-full font-label-sm text-label-sm text-on-surface-variant hover:bg-surface-container transition-colors" type="button">
                        Easy
                    </button>
<button class="flex-1 py-2 text-center rounded-full font-label-sm text-label-sm bg-primary-container text-on-primary-container shadow-sm transition-colors" type="button">
                        Medium
                    </button>
<button class="flex-1 py-2 text-center rounded-full font-label-sm text-label-sm text-on-surface-variant hover:bg-surface-container transition-colors" type="button">
                        Hard
                    </button>
</div>
</div>
<!-- Date Picker -->
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface" for="targetDate">Target Date</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-DEFAULT px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="targetDate" type="date"/>
</div>
</div>
<!-- Additional Notes Textarea -->
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface" for="additionalNotes">Additional Notes</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant rounded-DEFAULT px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all min-h-[120px] resize-none" id="additionalNotes" placeholder="Any extra context or rewards associated with this goal..."></textarea>
</div>
</div>
<!-- Submit Button Area -->
<div class="mt-4 mb-stack-lg">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-full font-label-lg text-label-lg flex items-center justify-center hover:bg-surface-tint active:scale-95 transition-all duration-200 shadow-sm" onclick="window.location.href='14_therapist_patient_profile.html'">
                Save Goal
            </button>
</div>
