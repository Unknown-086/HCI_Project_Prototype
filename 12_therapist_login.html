<body class="bg-surface-container-lowest min-h-screen flex flex-col font-body-md text-on-surface antialiased">
<!-- Soft Blue Top Header Block -->
<header class="bg-primary-fixed w-full flex flex-col items-center justify-center pt-16 pb-12 px-margin-mobile rounded-b-xl shrink-0">
<div class="bg-primary-container text-on-primary-container p-4 rounded-full mb-4 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl" data-icon="health_and_safety" style="font-variation-settings: 'FILL' 1;">health_and_safety</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-primary-fixed mb-1 text-center">
            TherapyBuddy
        </h1>
<p class="font-label-lg text-label-lg text-on-primary-fixed-variant text-center opacity-90">
            Therapist Portal
        </p>
</header>
<!-- Main Content Canvas (Login Form) -->
<main class="flex-1 w-full max-w-md mx-auto px-margin-mobile py-stack-lg flex flex-col">
<form action="#" class="flex flex-col gap-stack-md w-full" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">
                    Email Address
                </label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="mail">mail</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface-bright border border-outline-variant rounded-DEFAULT font-body-md text-on-surface placeholder:text-outline-variant focus:border-2 focus:border-primary focus:outline-none transition-colors" id="email" name="email" placeholder="name@clinic.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="password">
                    Password
                </label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="lock">lock</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface-bright border border-outline-variant rounded-DEFAULT font-body-md text-on-surface placeholder:text-outline-variant focus:border-2 focus:border-primary focus:outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full h-[56px] mt-stack-sm bg-primary text-on-primary font-label-lg text-label-lg rounded-full flex items-center justify-center transition-transform hover:scale-[0.98] active:scale-[0.95]" onclick="window.location.href='13_therapist_overview.html'; return false;" type="submit">
                Login
            </button>
</form>
<!-- Forgot Password Link -->
<div class="mt-stack-md text-center">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors focus:outline-none focus:underline rounded px-2 py-1" href="#">
                Forgot Password?
            </a>
</div>
</main>
</body></html>
