<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-primary-container">Parent Portal</h1>
<p class="font-body-md text-body-md text-on-primary-container mt-1 opacity-90">TherapyBuddy</p>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-margin-mobile pt-stack-md pb-stack-lg">
<div class="mb-stack-md text-center">
<p class="font-body-lg text-body-lg text-on-surface-variant">Welcome back. Please enter your details to view your child's progress.</p>
</div>
<form class="flex flex-col gap-stack-md flex-1">
<!-- Email Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface ml-1" for="email">Email Address</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">mail</span>
<input class="w-full h-[56px] rounded-lg border border-outline-variant bg-surface-container-lowest pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface ml-1" for="password">Password</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">lock</span>
<input class="w-full h-[56px] rounded-lg border border-outline-variant bg-surface-container-lowest pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="password" placeholder="Enter your password" required="" type="password"/>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end mt-[-8px]">
<a class="font-label-sm text-label-sm text-primary hover:text-surface-tint transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 rounded px-1" href="#">
                        Forgot Password?
                    </a>
</div>
<!-- Spacer to push button down if needed -->
<div class="flex-1 min-h-[32px]"></div>

<button class="w-full min-h-[56px] rounded-full bg-primary text-on-primary font-label-lg text-label-lg flex items-center justify-center gap-2 hover:bg-surface-tint active:scale-[0.98] transition-all focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 shadow-sm" onclick="window.location.href='3_Parent_Overview.html'; return false;" type="submit">
