<!-- Role Toggle -->
<div class="flex gap-4 mb-stack-lg">
<button class="flex-1 bg-primary text-on-primary font-label-lg text-label-lg py-4 rounded-full flex items-center justify-center" onclick="window.location.href='2_Parent_Login.html'">

                </button>
<button class="flex-1 border border-outline-variant text-on-surface-variant bg-surface font-label-lg text-label-lg py-4 rounded-full flex items-center justify-center" onclick="window.location.href='12_therapist_login.html'">
                    Therapist
                </button>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-stack-md flex-grow">
<!-- Email Field -->
<div class="relative flex items-center w-full">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant">mail</span>
<input class="w-full pl-12 pr-4 py-4 rounded-full border border-outline-variant bg-surface text-on-surface focus:border-primary focus:ring-2 focus:ring-primary-container outline-none font-body-lg text-body-lg transition-all" placeholder="Email" type="email"/>
</div>
<!-- Password Field -->
<div class="relative flex items-center w-full mb-stack-sm">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant">lock</span>
<input class="w-full pl-12 pr-12 py-4 rounded-full border border-outline-variant bg-surface text-on-surface focus:border-primary focus:ring-2 focus:ring-primary-container outline-none font-body-lg text-body-lg transition-all" placeholder="Password" type="password"/>
<button class="absolute right-4 text-on-surface-variant focus:outline-none flex items-center justify-center" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<!-- Login Button -->
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-4 rounded-full flex items-center justify-center mt-stack-md active:scale-95 transition-transform" onclick="window.location.href='2_Parent_Login.html'" type="button">

                </button>
<!-- Forgot Password -->
<a class="text-center font-label-sm text-label-sm text-on-surface-variant mt-stack-sm underline decoration-outline-variant underline-offset-4" href="#">Forgot Password?</a>
