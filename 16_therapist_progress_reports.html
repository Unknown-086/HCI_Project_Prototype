<!-- Custom Header for Task-Focused Sub-page -->
<header class="flex items-center gap-4 px-margin-mobile py-4 sticky top-0 bg-surface-container-lowest z-40 border-b border-surface-container">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors" onclick="window.location.href='14_therapist_patient_profile.html'">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col">

<h1 class="font-headline-md text-headline-md text-on-surface">Reports</h1>
</div>
</header>
<main class="flex-1 flex flex-col gap-stack-md px-margin-mobile py-stack-md pb-stack-lg">

<button class="whitespace-nowrap px-6 py-3 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-label-lg text-label-lg hover:bg-surface-container-low transition-colors">

            </button>
<button class="whitespace-nowrap px-6 py-3 rounded-full bg-primary-container text-on-primary-container font-label-lg text-label-lg shadow-sm">
                This Week
            </button>
<button class="whitespace-nowrap px-6 py-3 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-label-lg text-label-lg hover:bg-surface-container-low transition-colors">
                This Month
            </button>
</div>
<!-- Stat Chips (Bento Grid) -->
<div class="grid grid-cols-3 gap-3">
<div class="flex flex-col items-center justify-center py-4 px-2 bg-surface-container rounded-lg border border-outline-variant">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary">12</span>
<span class="font-label-sm text-label-sm text-on-surface-variant text-center mt-1">Tasks Done</span>
</div>
<div class="flex flex-col items-center justify-center py-4 px-2 bg-surface-container rounded-lg border border-outline-variant">

<span class="font-label-sm text-label-sm text-on-surface-variant text-center mt-1">Goals Met</span>
</div>
<div class="flex flex-col items-center justify-center py-4 px-2 bg-surface-container rounded-lg border border-outline-variant">

<span class="font-label-sm text-label-sm text-on-surface-variant text-center mt-1">Streak</span>
</div>
</div>

<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-5 flex flex-col">
<div class="flex justify-between items-center mb-6">
<h2 class="font-label-lg text-label-lg text-on-surface">Daily Task Completion</h2>
<span class="material-symbols-outlined text-outline" data-icon="bar_chart">bar_chart</span>
</div>
<!-- Simulated Chart -->
<div class="h-40 flex items-end justify-between gap-2 mt-auto">
<div class="flex flex-col items-center gap-2 w-full">
<div class="w-full bg-primary-container rounded-t-sm" style="height: 40%;"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant">M</span>
</div>
<div class="flex flex-col items-center gap-2 w-full">
<div class="w-full bg-primary rounded-t-sm" style="height: 70%;"></div>

</div>
<div class="flex flex-col items-center gap-2 w-full">

</div>
<div class="flex flex-col items-center gap-2 w-full">

<div class="flex flex-col items-center gap-2 w-full">

</div>
</div>
</div>

<!-- Item 1 -->
<div class="flex items-center gap-4 p-4 rounded-lg border border-surface-container bg-surface-container-lowest">

<div class="flex flex-col flex-1">

</div>
<!-- Item 2 -->

</div>
